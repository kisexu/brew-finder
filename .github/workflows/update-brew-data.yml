name: Update Brew Data

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: update-brew-data
  cancel-in-progress: false

jobs:
  update-data:
    name: Fetch, clean, and build extension data
    runs-on: ubuntu-latest

    steps:
      - name: Checkout develop
        uses: actions/checkout@v7
        with:
          ref: develop

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch and clean Homebrew package maps
        run: npm run build:maps

      - name: Build extension data bundle
        run: npm run build:extension

      - name: Run tests
        run: npm test

      - name: Create update pull request
        uses: peter-evans/create-pull-request@v8
        with:
          base: develop
          branch: chore/update-brew-data
          delete-branch: true
          title: "chore: update Homebrew package maps"
          commit-message: "chore: update Homebrew package maps"
          body: |
            Automated Homebrew package map update.

            This workflow ran:
            - `npm run build:maps`
            - `npm run build:extension`
            - `npm test`
